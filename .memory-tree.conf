# .memory-tree.conf — per-repo config for the memory-tree hygiene kit (coding-governance dogfooding itself).
MEMORY_ROOT=memory

# Disciplines = this repo's own areas of work.
#   playbook  — the governance template + its companions (parallel-coding-governance.*)
#   kickoff   — the /session-kickoff engine + the kickoff-manifest ratchet
#   tooling   — the reusable kits: memory-tree, codebase-map, hooks, workflows, agent-instructions, gates
#   deployer  — the single-ratchet deployer (govkit) research + design
DISCIPLINES="playbook kickoff tooling deployer"

# discipline:FAMILY — id prefix for that discipline's decisions/backlog + its build-folder FAMILY.
FAMILIES="playbook:PLAY kickoff:KICK tooling:TOOL deployer:DEPL"

# Not migrating away from an old tree root; the sprawled root docs are individually re-filed.
TOMBSTONE_ROOTS=""

# Spec-format ratchet (check 12): specs dated >= this follow memory/TEMPLATE-SPEC.md.
SPEC_FORMAT_CUTOFF="2026-07-15"
